<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel del Entrenador — FitApp</title>
<link rel="stylesheet" href="../styles/global.css?v=20260616c">
<link rel="stylesheet" href="../styles/coach.css?v=20260616c">
</head>
<body class="coach-body">
<div id="coach-app">
  <aside id="coach-sidebar">
    <div class="cs-logo">FitCoach</div>
    <nav>
      <button data-sec="dashboard" class="active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span class="label">Dashboard</span>
      </button>
      <button data-sec="alumnos">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span class="label">Mis alumnos</span>
      </button>
      <button data-sec="rutinas">
        <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12M2 7h4M18 7h4M2 17h4M18 17h4"/></svg>
        <span class="label">Rutinas</span>
      </button>
      <button data-sec="alimentacion">
        <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        <span class="label">Alimentación</span>
      </button>
      <button data-sec="ejercicios">
        <svg viewBox="0 0 24 24"><path d="M4 8v8M20 8v8M2 10v4M22 10v4M7 12h10"/></svg>
        <span class="label">Ejercicios</span>
      </button>
      <button data-sec="mensajes">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span class="label">Mensajes</span>
      </button>
      <button data-sec="gym">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path d="M9 22V12h6v10"/></svg>
        <span class="label">Mi Gimnasio</span>
      </button>
      <button data-sec="videos">
        <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        <span class="label">Videos</span>
      </button>
      <button data-sec="intakes">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>
        <span class="label">Intakes</span>
      </button>
      <button data-sec="ingresos">
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        <span class="label">Ingresos</span>
      </button>
    </nav>
    <div class="cs-foot"><a href="../index.html" style="color:#999;">← Salir del panel</a></div>
  </aside>

  <main id="coach-main">
    <div id="sec-dashboard"></div>
    <div id="sec-alumnos" style="display:none"></div>
    <div id="sec-rutinas" style="display:none"></div>
    <div id="sec-alimentacion" style="display:none"></div>
    <div id="sec-ejercicios" style="display:none"></div>
    <div id="sec-mensajes" style="display:none"></div>
    <div id="sec-gym" style="display:none"></div>
    <div id="sec-videos" style="display:none"></div>
    <div id="sec-intakes" style="display:none"></div>
    <div id="sec-ingresos" style="display:none"></div>
  </main>
</div>

<script src="../js/ejercicios-default.js?v=20260619b"></script>
<script src="../js/db.js?v=20260621a"></script>
<script src="../js/shared.js?v=20260616c"></script>
<script src="../js/coach.js?v=20260616c"></script>
</body>
</html>
