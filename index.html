<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FitApp — Entrenador y Alumno</title>
<link rel="manifest" href="manifest.json?v=20260616c">
<meta name="theme-color" content="#E8F500">
<link rel="stylesheet" href="styles/global.css?v=20260616c">
<style>
  body{ display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .gate{ max-width:380px; width:100%; }
  .gate h1{ font-family:var(--font-display); font-size:2rem; text-align:center; margin-bottom:6px; }
  .gate p.sub{ text-align:center; color:var(--text-muted); margin-bottom:28px; font-size:.9rem; }
  .role-card{ background:var(--surface); border-radius:16px; padding:22px; margin-bottom:16px; box-shadow:0 1px 8px rgba(0,0,0,.06); }
  .role-card .icon{ font-size:2rem; margin-bottom:8px; }
  .role-card h2{ font-size:1.1rem; margin-bottom:4px; }
  .role-card p{ font-size:.85rem; color:var(--text-muted); margin-bottom:14px; }
  .role-card input{ width:100%; padding:14px; border-radius:10px; border:1px solid var(--border); font-size:1.2rem; text-align:center; letter-spacing:4px; margin-bottom:10px; font-family:var(--font-data); }
  .error-msg{ color:var(--red); font-size:.8rem; margin-bottom:10px; display:none; }
  .continuar{ background:var(--surface); border:2px solid var(--green); border-radius:50px; padding:12px; text-align:center; margin-bottom:16px; font-weight:700; color:var(--green); cursor:pointer; }
</style>
</head>
<body>
<div class="gate">
  <h1>FitApp</h1>
  <p class="sub">Entrena en serio. Sin excusas.</p>

  <div class="continuar" id="continuar-sesion" style="display:none;"></div>

  <div class="role-card">
    <div class="icon">📋</div>
    <h2>Soy entrenador</h2>
    <p>Crea rutinas, planes de alimentación y sigue a tus alumnos.</p>
    <button class="pill-btn" id="btn-coach">Entrar al panel</button>
  </div>

  <div class="role-card">
    <div class="icon">🏃</div>
    <h2>Soy alumno</h2>
    <p>Ingresa tu código de 4 dígitos para ver tu rutina y plan.</p>
    <input type="number" id="codigo-alumno" maxlength="4" placeholder="••••" inputmode="numeric">
    <p class="error-msg" id="error-codigo">Código incorrecto, contacta a tu entrenador.</p>
    <button class="pill-btn" style="background:var(--orange);" id="btn-alumno">Entrar</button>
    <p style="text-align:center;margin-top:10px;font-size:.78rem;color:var(--text-muted);">Demo: prueba con el código 1111</p>
  </div>
</div>

<script src="js/db.js?v=20260616c"></script>
<script>
(function(){
  "use strict";
  function safe(fn){ try{ fn(); }catch(e){ console.error(e); } }

  safe(function(){
    var actualId = window.db.getAlumnoActual();
    if(actualId){
      var a = window.db.getAlumnoPorId(actualId);
      if(a){
        var box = document.getElementById("continuar-sesion");
        box.style.display = "block";
        box.textContent = "Continuar como " + a.nombre;
        box.addEventListener("click", function(){ location.href = "alumno/index.html"; });
      }
    }
  });

  safe(function(){
    document.getElementById("btn-coach").addEventListener("click", function(){
      location.href = "coach/index.html";
    });
  });

  safe(function(){
    document.getElementById("btn-alumno").addEventListener("click", function(){
      var codigo = document.getElementById("codigo-alumno").value.trim();
      var a = window.db.getAlumnoPorCodigo(codigo);
      var err = document.getElementById("error-codigo");
      if(a){
        window.db.setAlumnoActual(a.id);
        location.href = "alumno/index.html";
      } else {
        err.style.display = "block";
      }
    });
  });
})();
</script>
</body>
</html>
